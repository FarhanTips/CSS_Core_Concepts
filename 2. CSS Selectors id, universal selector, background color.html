<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS for Beginners</title>
    <!-- Internal CSS: CSS written inside the <style> tag. -->
    <style>
        p{
            color:blueviolet; 
        }

        h1{
            color:cadetblue;
        }

        .Brazil{
            color: yellowgreen;
        }

        /* It is called Id selector and we must use one id for one element only. */

        /* fourthl এর আগে "#" কারন fouth কোনো tag বা class না বরং id */
        #fourth{
            color:brown;
        }

    /* Internal CSS and Class selector usually head section এর মধ্যে থাকে। */
    </style>
</head>
<body>
    <p>This is a simple paragraph.</p>  
    <p>This is another paragraph.</p>    
    <p>This is third paragraph.</p>    
    <p id="fourth">This is fourth paragraph.</p>   

    <p>This is fifth paragraph.</p>    
    <p>This is sixth paragraph.</p> 
    <h1>This is Heading</h1>
    <h2 class="Brazil">This is subheading</h2>   
    <h3>This is h3</h3>   
    <h4 class="Brazil">This is h4</h4>   
    <h5>This is h5</h5>   

</body>
</html>
