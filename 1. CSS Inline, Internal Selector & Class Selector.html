<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS for Beginners</title>
    <!-- Internal CSS: CSS written inside the <style> tag. -->
    <style>
        /* Selector: p (selects all <p> elements). */
        p{
            /* color → Property */
            /* blueviolet → Value */
            color:blueviolet; 
        }

        h1{
            color:cadetblue;
        }
        
        /* A class selector selects and styles all HTML elements that have the same class attribute. */

        /* Selector: Brazil (selects all html elements that has class attribute value = Brazil). */
        /* Brazil এর আগে "." কারন Brazil কোনো tag না বরং class */
        .Brazil{
            color: yellowgreen;
        }

    /* Internal CSS and Class selector usually head section এর মধ্যে থাকে। */
    </style>
</head>
<body>
    <p style="color:red;">This is a simple paragraph.</p>  
      <!-- This is called inline CSS. Inline CSS is CSS written directly inside an HTML element using the style attribute. It affects only that specific element.  -->
    <p>This is another paragraph.</p>    
    <p>This is third paragraph.</p>    
    <p style="color:burlywood;">This is fourth paragraph.</p>   
      <!-- This is called inline CSS. Inline CSS is CSS written directly inside an HTML element using the style attribute. It affects only that specific element.  --> 
    <p>This is fifth paragraph.</p>    
    <p>This is sixth paragraph.</p> 
    <h1>This is Heading</h1>
    <h2 class="Brazil">This is subheading</h2>   
    <h3>This is h3</h3>   
    <h4 class="Brazil">This is h4</h4>   
    <h5>This is h5</h5>   

</body>
</html>
