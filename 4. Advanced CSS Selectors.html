<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced CSS Selectors for Beginners</title>

    <style>
        /* This is called Group Slector. এখানে tag, id, class selector - সবগুলোকেই ব্যবহার করা যায়।*/
        ol,ul,.special{
            background-color: bisque;
        }
    </style>
</head>
<body>
    <h1>This is a Heading H1</h1>
    <h2>This is a Subeading H2</h2>
    <h3 class="special">This is a H3</h3>
    <h4>This is a H4</h4>
    <p>This is a simple Paragraph.</p>

    <ol>
        <li>Messi</li>
        <li>Ronaldo</li>
        <li>Neymar</li>
        <li>Mbappe</li>
        <li>Haland</li>
    </ol>

    <ul>
        <li>Rice</li>
        <li>Dal</li>
        <li>Beef</li>
        <li>Mutton</li>
        <li>Fish</li>
    </ul>
</body>
</html>
